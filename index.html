<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주도 여행</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0f1923; } button:active { transform: scale(0.97); }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const SUPABASE_URL = "https://bzkyfqpmrhxjvmjhwrhn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6a3lmcXBtcmh4anZtamh3cmhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTQzMjAsImV4cCI6MjA5MzM3MDMyMH0.8un8WlpVYVFr0ktQIVvzGU6KjOUm2LzWWF90e1ery-U";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const DATA_KEY = "jeju-trip-v1";

    const defaultDays = [
      { id: 1, label: "Day 1", emoji: "🌊", color: "#4A90D9", items: [
        { id: "1-1", time: "아침", title: "우진해장국", desc: "牛骨解酒湯", map: "우진해장국 제주", done: false },
        { id: "1-2", time: "오전", title: "휴애리 자연생태공원", desc: "", map: "휴애리 자연생태공원", done: false },
        { id: "1-3", time: "오전", title: "카페 ①", desc: "", map: "", done: false },
        { id: "1-4", time: "점심", title: "해물라면 / 회 / 해물", desc: "", map: "", done: false },
        { id: "1-5", time: "오후", title: "동사무소", desc: "", map: "", done: false },
        { id: "1-6", time: "저녁 7시", title: "저녁식사", desc: "", map: "", done: false },
      ]},
      { id: 2, label: "Day 2", emoji: "🐷", color: "#E8855A", items: [
        { id: "2-1", time: "오전", title: "섭소각", desc: "", map: "섭소각 제주", done: false },
        { id: "2-2", time: "오전", title: "카페 ②", desc: "", map: "", done: false },
        { id: "2-3", time: "점심", title: "갈치 점심", desc: "", map: "", done: false },
        { id: "2-4", time: "오후", title: "카페 ③", desc: "", map: "", done: false },
        { id: "2-5", time: "오후", title: "카트", desc: "卡丁車", map: "제주 카트", done: false },
        { id: "2-6", time: "저녁", title: "흑돼지", desc: "", map: "", done: false },
      ]},
      { id: 3, label: "Day 3", emoji: "✈️", color: "#5BAD8A", items: [
        { id: "3-1", time: "아침", title: "제주시민오일장", desc: "", map: "제주시민오일장", done: false },
        { id: "3-2", time: "오전", title: "빈티지 쇼핑", desc: "", map: "", done: false },
        { id: "3-3", time: "오후", title: "카페 ④", desc: "", map: "", done: false },
        { id: "3-4", time: "오후", title: "LP 바 / 내도음악상가", desc: "", map: "내도음악상가 제주", done: false },
        { id: "3-5", time: "저녁", title: "소금바치순이네", desc: "", map: "소금바치순이네", done: false },
        { id: "3-6", time: "밤", title: "bye~ ✈️", desc: "", map: "제주국제공항", done: false },
      ]},
    ];

    function genId() { return Math.random().toString(36).slice(2, 9); }
    const inputStyle = { width: "100%", padding: "8px 10px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 8, color: "#fff", fontSize: 13, outline: "none" };
    const btnPrimary = (color) => ({ flex: 1, padding: "8px", background: color, color: "#fff", border: "none", borderRadius: 8, fontSize: 13, cursor: "pointer", fontWeight: 700 });
    const btnSecondary = { flex: 1, padding: "8px", background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.6)", border: "none", borderRadius: 8, fontSize: 13, cursor: "pointer" };

    async function loadFromSupabase() {
      const { data } = await supabase.from("trip_data").select("value").eq("key", DATA_KEY).single();
      if (data) return JSON.parse(data.value);
      return null;
    }
    async function saveToSupabase(payload) {
  const { error } = await supabase
    .from("trip_data")
    .upsert(
      { key: DATA_KEY, value: JSON.stringify(payload) },
      { onConflict: "key" }
    );

  if (error) {
    console.error("Supabase 저장 실패:", error);
    alert("저장 실패: " + error.message);
    return false;
  }

  console.log("Supabase 저장 성공");
  return true;
}

    function App() {
      const [days, setDays] = useState(defaultDays);
      const [activeDay, setActiveDay] = useState(1);
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [title, setTitle] = useState("제주도 3일 여행");
      const [editingTitle, setEditingTitle] = useState(false);
      const [titleDraft, setTitleDraft] = useState("");
      const [loaded, setLoaded] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const saveTimeout = useRef(null);

      useEffect(() => {
        (async () => {
          const saved = await loadFromSupabase();
          if (saved) { if (saved.days) setDays(saved.days); if (saved.title) setTitle(saved.title); }
          setLoaded(true);
        })();
        const interval = setInterval(async () => {
          const saved = await loadFromSupabase();
          if (saved) { if (saved.days) setDays(saved.days); if (saved.title) setTitle(saved.title); }
        }, 10000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        clearTimeout(saveTimeout.current);
        saveTimeout.current = setTimeout(async () => {
          setSyncing(true);
          await saveToSupabase({ days, title });
          setSyncing(false);
        }, 800);
      }, [days, title, loaded]);

      const moveItem = (dayId, idx, dir) => {
        setDays(days.map(d => {
          if (d.id !== dayId) return d;
          const items = [...d.items];
          const target = idx + dir;
          if (target < 0 || target >= items.length) return d;
          [items[idx], items[target]] = [items[target], items[idx]];
          return { ...d, items };
        }));
      };

      const currentDay = days.find(d => d.id === activeDay) || days[0];
      const toggleDone = (dayId, itemId) => setDays(days.map(d => d.id === dayId ? { ...d, items: d.items.map(i => i.id === itemId ? { ...i, done: !i.done } : i) } : d));
      const startEdit = (item) => { setEditingId(item.id); setEditForm({ ...item }); };
      const saveEdit = (dayId) => { setDays(days.map(d => d.id === dayId ? { ...d, items: d.items.map(i => i.id === editingId ? { ...editForm, id: i.id } : i) } : d)); setEditingId(null); };
      const deleteItem = (dayId, itemId) => { setDays(days.map(d => d.id === dayId ? { ...d, items: d.items.filter(i => i.id !== itemId) } : d)); if (editingId === itemId) setEditingId(null); };
      const addItem = (dayId) => { const newId = genId(); const blank = { id: newId, time: "", title: "새 일정", desc: "", map: "", done: false }; setDays(days.map(d => d.id === dayId ? { ...d, items: [...d.items, blank] } : d)); setEditingId(newId); setEditForm(blank); };
      const totalDone = days.reduce((s, d) => s + d.items.filter(i => i.done).length, 0);
      const totalItems = days.reduce((s, d) => s + d.items.length, 0);
      const pct = totalItems ? Math.round((totalDone / totalItems) * 100) : 0;

      if (!loaded) return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#0f1923", color: "#fff", fontSize: 18 }}>불러오는 중…</div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#0f1923", fontFamily: "'Noto Sans KR', sans-serif", color: "#fff", maxWidth: 480, margin: "0 auto" }}>
          <div style={{ padding: "32px 20px 20px", background: "linear-gradient(160deg, #1a2e42 0%, #0f1923 100%)", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ fontSize: 11, letterSpacing: 4, color: "#7CB8E8", marginBottom: 6 }}>🍊 JEJU ISLAND</div>
            {editingTitle ? (
              <div style={{ display: "flex", gap: 8 }}>
                <input autoFocus value={titleDraft} onChange={e => setTitleDraft(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { setTitle(titleDraft); setEditingTitle(false); } }} style={{ ...inputStyle, fontSize: 20, fontWeight: 800, flex: 1 }} />
                <button onClick={() => { setTitle(titleDraft); setEditingTitle(false); }} style={{ ...btnPrimary("#4A90D9"), flex: "none", padding: "8px 14px" }}>저장</button>
              </div>
            ) : (
              <div onClick={() => { setTitleDraft(title); setEditingTitle(true); }} style={{ fontSize: 26, fontWeight: 800, letterSpacing: -1, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                {title} <span style={{ fontSize: 13, color: "rgba(255,255,255,0.2)", fontWeight: 400 }}>✏️</span>
              </div>
            )}
            <div style={{ marginTop: 18, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1, height: 4, background: "rgba(255,255,255,0.1)", borderRadius: 99, overflow: "hidden" }}>
                <div style={{ height: "100%", borderRadius: 99, background: "linear-gradient(to right, #4A90D9, #5BAD8A)", width: `${pct}%`, transition: "width 0.5s ease" }} />
              </div>
              <div style={{ fontSize: 12, color: "#7CB8E8", whiteSpace: "nowrap" }}>{totalDone}/{totalItems} 완료</div>
            </div>
            <div style={{ fontSize: 10, color: syncing ? "#7CB8E8" : "rgba(255,255,255,0.25)", marginTop: 8 }}>
              {syncing ? "⟳ 동기화 중..." : "✦ 실시간 동기화 — 10초마다 자동 업데이트"}
            </div>
          </div>

          <div style={{ display: "flex", padding: "12px 16px 0", gap: 8 }}>
            {days.map(d => (
              <button key={d.id} onClick={() => setActiveDay(d.id)} style={{ flex: 1, padding: "10px 4px", background: activeDay === d.id ? d.color : "rgba(255,255,255,0.05)", border: "none", borderRadius: 12, cursor: "pointer", color: activeDay === d.id ? "#fff" : "rgba(255,255,255,0.4)", fontWeight: activeDay === d.id ? 700 : 400, fontSize: 12, transition: "all 0.2s" }}>
                <div style={{ fontSize: 18 }}>{d.emoji}</div>
                <div>{d.label}</div>
                <div style={{ fontSize: 10, marginTop: 2, opacity: 0.75 }}>{d.items.filter(i => i.done).length}/{d.items.length}</div>
              </button>
            ))}
          </div>

          <div style={{ padding: "16px 16px 100px" }}>
            {currentDay.items.map((item, idx) => (
              <div key={item.id} style={{ display: "flex", gap: 10, marginBottom: 2 }}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, paddingTop: 10, width: 24 }}>
                  <button onClick={() => moveItem(currentDay.id, idx, -1)} disabled={idx === 0} style={{ width: 22, height: 22, borderRadius: 6, border: "none", background: idx === 0 ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.08)", color: idx === 0 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.5)", cursor: idx === 0 ? "default" : "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center" }}>▲</button>
                  <button onClick={() => moveItem(currentDay.id, idx, 1)} disabled={idx === currentDay.items.length - 1} style={{ width: 22, height: 22, borderRadius: 6, border: "none", background: idx === currentDay.items.length - 1 ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.08)", color: idx === currentDay.items.length - 1 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.5)", cursor: idx === currentDay.items.length - 1 ? "default" : "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center" }}>▼</button>
                </div>

                {editingId === item.id ? (
                  <div style={{ flex: 1, marginBottom: 8, background: "rgba(255,255,255,0.06)", border: `1px solid ${currentDay.color}66`, borderRadius: 14, padding: 14 }}>
                    <input value={editForm.time} onChange={e => setEditForm({ ...editForm, time: e.target.value })} placeholder="시간 (예: 점심)" style={inputStyle} />
                    <input value={editForm.title} onChange={e => setEditForm({ ...editForm, title: e.target.value })} placeholder="일정 이름" style={{ ...inputStyle, fontWeight: 700, fontSize: 15, marginTop: 6 }} />
                    <input value={editForm.desc} onChange={e => setEditForm({ ...editForm, desc: e.target.value })} placeholder="메모 (선택사항)" style={{ ...inputStyle, marginTop: 6, fontSize: 12 }} />
                    <input value={editForm.map || ""} onChange={e => setEditForm({ ...editForm, map: e.target.value })} placeholder="📍 장소명 또는 주소 (Naver Maps 연결)" style={{ ...inputStyle, marginTop: 6, fontSize: 12 }} />
                    <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                      <button onClick={() => saveEdit(currentDay.id)} style={btnPrimary(currentDay.color)}>저장</button>
                      <button onClick={() => setEditingId(null)} style={btnSecondary}>취소</button>
                      <button onClick={() => deleteItem(currentDay.id, item.id)} style={{ ...btnSecondary, marginLeft: "auto", color: "#E87070" }}>삭제</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ flex: 1, marginBottom: 8, background: item.done ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: "12px 14px", opacity: item.done ? 0.5 : 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div onClick={() => startEdit(item)} style={{ flex: 1, cursor: "pointer" }}>
                        {item.time && <div style={{ fontSize: 10, color: currentDay.color, fontWeight: 600, marginBottom: 2, letterSpacing: 1 }}>{item.time}</div>}
                        <div style={{ fontSize: 14, fontWeight: 600, textDecoration: item.done ? "line-through" : "none", color: item.done ? "rgba(255,255,255,0.4)" : "#fff" }}>{item.title}</div>
                        {item.desc && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>{item.desc}</div>}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                        {item.map ? (
                          <a
                            href={`https://map.naver.com/p/search/${encodeURIComponent(item.map)}`}
                            target="_blank"
                            rel="noopener noreferrer"
                            onClick={e => e.stopPropagation()}
                            style={{ width: 30, height: 30, borderRadius: 8, background: "rgba(74,144,217,0.2)", border: "1px solid rgba(74,144,217,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, textDecoration: "none" }}
                          >📍</a>
                        ) : null}
                        <button onClick={e => { e.stopPropagation(); toggleDone(currentDay.id, item.id); }} style={{ width: 30, height: 30, borderRadius: 8, border: "none", cursor: "pointer", background: item.done ? currentDay.color : "rgba(255,255,255,0.08)", color: item.done ? "#fff" : "rgba(255,255,255,0.3)", fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {item.done ? "✓" : "○"}
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))}
            <button onClick={() => addItem(currentDay.id)} style={{ width: "100%", marginTop: 4, padding: "11px", background: "none", border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 14, cursor: "pointer", color: "rgba(255,255,255,0.25)", fontSize: 13 }}>
              ＋ 일정 추가
            </button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
